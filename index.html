<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Sort</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="init()">

<div class="game-container">

    <div class="top-bar">
        <button onclick="showMainMenu()">🏠</button>
        <button onclick="reset()">🔄</button>

        <div>
            <span id="txt-level">Level</span>
            <span id="level-num">1</span>
        </div>

        <button onclick="skipLevel()">⏭️</button>
        <button onclick="undo()">↩️ <span id="undo-count">0</span></button>
        <button onclick="addTube()">+🧪</button>
    </div>

    <div id="board"></div>

    <!-- START -->
    <div id="start-menu" class="overlay">
        <div class="menu-card">
            <h1>NEON SORT</h1>
            <div>
                <span id="txt-start-level">Level</span>
                <span id="start-level">1</span>
            </div>
            <button onclick="startGame()">▶</button>
            <button onclick="toggleSettings(true)">⚙️</button>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-panel" class="overlay">
        <div class="settings-card">

            <button onclick="toggleSettings(false)">✖</button>
            <h2 id="txt-settings">Settings</h2>

            <div class="lang-switch">
                <button onclick="changeLang('en')" id="btn-en">EN</button>
                <button onclick="changeLang('ar')" id="btn-ar">AR</button>
                <button onclick="changeLang('fa')" id="btn-fa">FA</button>
            </div>

            <button id="sound-toggle" class="setting-btn active" onclick="toggleOption('sound')">
                🔊 <span id="txt-sound">Sound</span>
            </button>

            <button id="vibrate-toggle" class="setting-btn active" onclick="toggleOption('vibrate')">
                📳 <span id="txt-vibrate">Vibrate</span>
            </button>

            <button id="txt-contact">Contact</button>
            <button id="txt-share" onclick="shareGame()">Share</button>

        </div>
    </div>

    <!-- WIN -->
    <div id="win-overlay" class="overlay">
        <div class="win-card">
            <h2 id="txt-win">FANTASTIC</h2>
            <button id="txt-next" onclick="nextLevel()">NEXT</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
