<div id="settings-panel" class="overlay">
    <div class="settings-card">
        <div class="settings-header">
            <button class="close-btn" onclick="toggleSettings(false)">✖</button>
            <h2 id="txt-settings">Settings</h2>
        </div>
        
        <div class="lang-switch">
            <button onclick="changeLang('en')" id="btn-en">EN</button>
            <button onclick="changeLang('ar')" id="btn-ar">AR</button>
            <button onclick="changeLang('fa')" id="btn-fa">FA</button>
        </div>

        <div class="settings-grid">
            <div class="setting-item active" id="sound-btn" onclick="toggleSound()">
                <div class="icon">🔊</div>
                <span id="txt-sound">Sound</span>
            </div>
            <div class="setting-item active" id="vibrate-btn" onclick="toggleVibrate()">
                <div class="icon">📳</div>
                <span id="txt-vibrate">Vibrate</span>
            </div>
        </div>

        <div class="menu-links">
            <button class="link-btn" onclick="shareGame()">
                <span id="txt-share">Share Game</span> 🔗
            </button>
            <button class="link-btn" onclick="window.location.href='privacy-policy.html'">
                <span id="txt-privacy">Privacy</span> 🔒
            </button>
        </div>
    </div>
</div>
