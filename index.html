<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Ball Sort</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <div class="top-bar">
        <button onclick="showMainMenu()">🏠</button>
        <button onclick="reset()">🔄</button>

        <div>
            <span id="txt-level">Level</span>
            <span id="level-num">1</span>
        </div>

        <div class="coin-box">💰 <span id="coins">0</span></div>

        <button onclick="skipLevel()">⏭️</button>
        <button onclick="undo()">↩️ <span id="undo-count">0</span></button>
        <button onclick="addTube()">+🧪</button>
    </div>

    <div id="board"></div>

    <!-- START -->
    <div id="start-menu" class="overlay">
        <div class="menu-card">
            <h1>NEON SORT</h1>
            <div>
                <span id="txt-start-level">Level</span>
                <span id="start-level">1</span>
            </div>
            <button onclick="startGame()">▶ Start</button>
            <button onclick="toggleSettings(true)">⚙ Settings</button>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-panel" class="overlay">
        <div class="settings-card">
            <button onclick="toggleSettings(false)">✖</button>
            <h2 id="txt-settings">Settings</h2>

            <button id="sound-toggle" onclick="toggleOption('sound')">Sound</button>
            <button id="vibrate-toggle" onclick="toggleOption('vibrate')">Vibrate</button>

            <button onclick="shareGame()">Share</button>
        </div>
    </div>

    <!-- WIN -->
    <div id="win-overlay" class="overlay">
        <div class="win-card">
            <h2 id="txt-win">FANTASTIC</h2>
            <button onclick="nextLevel()">NEXT</button>
        </div>
    </div>

</div>

<!-- 🔥 مهم: defer -->
<script src="script.js" defer></script>

<!-- 🔥 اجرای قطعی -->
<script>
document.addEventListener("DOMContentLoaded", function(){
    if(typeof init === "function"){
        init();
    }else{
        console.error("script.js not loaded!");
    }
});
</script>

</body>
</html>
