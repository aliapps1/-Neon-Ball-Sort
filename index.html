<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Ball Sort Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <button class="icon-btn" onclick="showMainMenu()">🏠</button>
            <button class="icon-btn" onclick="reset()">🔄</button>
            <div class="level-tag">مستوى <span id="level-num">1</span></div>
            <button class="icon-btn" onclick="skipLevel()">⏭️</button>
            <button class="icon-btn" onclick="undo()">↩️ <small id="undo-count">0</small></button>
            <button class="icon-btn" onclick="addTube()">+🧪</button>
        </div>

        <div id="board"></div>

        <div id="start-menu" class="overlay">
            <div class="menu-card">
                <h1 class="title-text">BALL SORT PUZZLE</h1>
                <div class="crown-icon">👑</div>
                <div class="level-badge">مستوى <span id="start-level">1</span></div>
                <button class="play-btn" onclick="startGame()">▶</button>
                <div class="bottom-menu-actions">
                    <button class="circle-btn" onclick="toggleSettings(true)">⚙️</button>
                </div>
            </div>
        </div>

        <div id="settings-panel" class="overlay">
            <div class="settings-card">
                <div class="settings-header">
                    <button class="close-btn" onclick="toggleSettings(false)">✖</button>
                    <h2>الإعدادات</h2>
                </div>
                <div class="settings-grid">
                    <div class="setting-item active" id="sound-toggle" onclick="toggleOption('sound')">
                        <div class="icon">🔊</div>
                        <span>الصوت</span>
                    </div>
                    <div class="setting-item active" id="vibrate-toggle" onclick="toggleOption('vibrate')">
                        <div class="icon">📳</div>
                        <span>اهتزاز</span>
                    </div>
                    <div class="setting-item" id="auto-move-toggle" onclick="toggleOption('auto')">
                        <div class="icon">⚙️</div>
                        <span>التحرك التلقائي</span>
                    </div>
                </div>
                <div class="menu-links">
                    <button class="link-btn">📧 تواصل معنا</button>
                    <button class="link-btn" onclick="shareGame()">🔗 مشاركة</button>
                    <button class="link-btn">🔒 الخصوصية</button>
                </div>
                <div class="version-text">الإصدار 4.2.1</div>
            </div>
        </div>

        <div id="win-overlay" class="overlay">
            <div class="win-card">
                <div class="crown">👑</div>
                <h2 class="win-title">FANTASTIC!</h2>
                <button class="btn-next" onclick="nextLevel()">NEXT LEVEL</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
